<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tienda Hub Prestige Unlimited 💎</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: linear-gradient(135deg, #FFD700 0%, #B8860B 100%);
            --prestige-bg: #05070A;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #FACC15;
            --success: #10B981;
            --danger: #F43F5E;
            --text: #F8FAFC;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--prestige-bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #1E293B, #05070A);
            min-height: 100vh;
        }

        /* Efecto Vidrio */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
        }

        .screen { display: none; padding: 20px; animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .screen.active { display: block; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* Header de Lujo */
        .premium-header {
            padding: 30px 20px;
            text-align: left;
        }

        .main-balance {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 10px 0;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tarjetas de Menú */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
        
        .menu-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            text-align: left;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-card:active { transform: scale(0.9); background: rgba(255,255,255,0.05); }

        .menu-card i { 
            color: var(--accent); 
            width: 28px; height: 28px; 
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px rgba(250, 204, 21, 0.4));
        }

        .menu-card span { font-size: 14px; font-weight: 600; color: #94A3B8; display: block; }
        .menu-card b { font-size: 16px; color: white; display: block; margin-top: 4px; }

        /* Inputs y Botones Estilo Tesla */
        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .btn-gold {
            background: var(--gold);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            padding: 20px;
            border-radius: 18px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(184, 134, 11, 0.3);
        }

        .back-btn {
            width: 48px; height: 48px;
            border-radius: 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }

        /* Historial y Listas */
        .item-row {
            padding: 20px;
            margin-bottom: 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-stock {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="scr-home" class="screen active">
    <div class="premium-header">
        <small style="text-transform: uppercase; letter-spacing: 2px; color: #64748B; font-weight: 800;">Executive Dashboard</small>
        <h1 id="txt-saludo" style="margin: 5px 0 0 0; font-weight: 400;">Good morning, Boss.</h1>
        <div class="main-balance" id="h-caja">$0.00</div>
        <p id="quote" style="color: #94A3B8; font-size: 14px; margin-top: 0;"></p>
    </div>

    <div class="menu-grid">
        <div class="menu-card" onclick="goTo('scr-inv')"><i data-lucide="layers"></i><span>Global</span><b>Inventory</b></div>
        <div class="menu-card" onclick="goTo('scr-reports')"><i data-lucide="pie-chart"></i><span>Analytics</span><b>Reports</b></div>
        <div class="menu-card" onclick="goTo('scr-fiados')"><i data-lucide="landmark"></i><span>Credit</span><b>Receivables</b></div>
        <div class="menu-card" onclick="goTo('scr-gastos')"><i data-lucide="trending-down"></i><span>Outflow</span><b>Expenses</b></div>
    </div>

    <div style="margin-top: 25px;">
        <button onclick="finalizarTurno()" class="btn-gold">Finalize Turn & Archive</button>
        <div style="display:flex; gap:12px; margin-top:15px;">
            <button onclick="compartirCatalogo()" class="menu-card" style="flex:1; padding:15px; text-align:center;"><span>Share</span>Catalog</button>
            <button onclick="goTo('scr-cloud')" class="menu-card" style="width:70px; padding:15px; text-align:center;"><i data-lucide="settings" style="margin:0"></i></button>
        </div>
    </div>
</div>

<div id="scr-reports" class="screen">
    <button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="arrow-left"></i></button>
    <h1 style="margin-top:0">Market Intelligence</h1>
    <div class="glass-panel" style="padding:20px; margin-bottom:20px;">
        <canvas id="mainChart"></canvas>
    </div>
    <div id="history-list"></div>
</div>

<div id="scr-inv" class="screen">
    <button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="arrow-left"></i></button>
    <h1 style="margin-top:0">Stock Management</h1>
    <div class="glass-panel" style="padding:20px; margin-bottom:25px;">
        <input type="text" id="n" placeholder="Product Identity">
        <div style="display:flex; gap:10px;">
            <input type="number" id="v" placeholder="Price">
            <input type="number" id="s" placeholder="Stock">
        </div>
        <button onclick="add()" class="btn-gold">Confirm Entry</button>
    </div>
    <input type="text" id="search" placeholder="🔍 Search Assets..." oninput="render()" style="border-radius:30px; padding-left:25px;">
    <div id="list-inv"></div>
</div>

<div id="scr-fiados" class="screen">
    <button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="arrow-left"></i></button>
    <h1>Receivables</h1>
    <div class="glass-panel" style="padding:30px; text-align:center; margin-bottom:20px;">
        <small style="color:#94A3B8">CAPITAL AT RISK</small>
        <div id="total-fiado" style="font-size:36px; font-weight:800; color:var(--danger)">$0.00</div>
    </div>
    <div class="glass-panel" style="padding:20px;">
        <input type="text" id="f-nom" placeholder="Client Name">
        <input type="number" id="f-amo" placeholder="Amount">
        <button onclick="addFiado()" class="btn-gold">Authorize Credit</button>
    </div>
    <div id="list-fiados" style="margin-top:20px;"></div>
</div>

<div id="scr-cloud" class="screen">
    <button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="arrow-left"></i></button>
    <h1>Master Encryption</h1>
    <div class="glass-panel" style="padding:20px;">
        <small>System Backup Key</small>
        <textarea id="cloud-data" style="background:transparent; border:1px solid #334155; margin-top:10px; font-family:monospace; font-size:10px;" rows="4" readonly></textarea>
        <button onclick="copiarCloud()" class="btn-gold" style="margin-top:10px;">Copy Key</button>
    </div>
</div>

<script>
    // --- DATABASE ---
    let db = JSON.parse(localStorage.getItem('th_prestige_db')) || [];
    let fiados = JSON.parse(localStorage.getItem('th_prestige_fi')) || [];
    let gastos = JSON.parse(localStorage.getItem('th_prestige_ga')) || [];
    let historial = JSON.parse(localStorage.getItem('th_prestige_hi')) || [];
    let caja = parseFloat(localStorage.getItem('th_prestige_ca')) || 0;
    let chartInstance = null;

    function goTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'scr-reports') initChart();
        if(id === 'scr-cloud') document.getElementById('cloud-data').value = btoa(JSON.stringify({db, fiados, gastos, historial, caja}));
        render();
    }

    // --- CORE LOGIC ---
    function add() {
        const n = document.getElementById('n').value, v = parseFloat(document.getElementById('v').value), s = parseInt(document.getElementById('s').value);
        if(n && v) { db.push({id: Date.now(), n, v, s}); save(); document.getElementById('n').value=''; }
    }

    function vender(id) {
        let p = db.find(x => x.id === id);
        if(p && p.s > 0) { p.s--; caja += p.v; save(); }
    }

    function addFiado() {
        const n = document.getElementById('f-nom').value, a = parseFloat(document.getElementById('f-amo').value);
        if(n && a) { fiados.push({id: Date.now(), n, a, fecha: new Date().toLocaleDateString()}); save(); document.getElementById('f-nom').value=''; }
    }

    function finalizarTurno() {
        if(caja === 0 && gastos.length === 0) return;
        if(confirm("Confirm Archive Process?")) {
            const hoy = new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'short'});
            historial.push({ fecha: hoy, ventas: caja, gastos: gastos.reduce((a,b)=>a+b.a,0) });
            caja = 0; gastos = [];
            save(); goTo('scr-reports');
        }
    }

    function save() {
        localStorage.setItem('th_prestige_db', JSON.stringify(db));
        localStorage.setItem('th_prestige_fi', JSON.stringify(fiados));
        localStorage.setItem('th_prestige_ga', JSON.stringify(gastos));
        localStorage.setItem('th_prestige_hi', JSON.stringify(historial));
        localStorage.setItem('th_prestige_ca', caja);
        render();
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        const data = historial.slice(-7);
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.fecha),
                datasets: [{
                    label: 'Performance',
                    data: data.map(d => d.ventas),
                    borderColor: '#FACC15',
                    borderWidth: 4,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(250, 204, 21, 0.1)'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#64748B' } } } }
        });
        
        const hl = document.getElementById('history-list');
        hl.innerHTML = '';
        historial.slice().reverse().forEach(h => {
            hl.innerHTML += `<div class="item-row"><div><b>${h.fecha}</b></div><div style="color:var(--success); font-weight:800;">+$${h.ventas.toFixed(2)}</div></div>`;
        });
    }

    function render() {
        document.getElementById('h-caja').innerText = "$" + caja.toLocaleString('en-US', {minimumFractionDigits: 2});
        
        const li = document.getElementById('list-inv');
        if(li) {
            const q = document.getElementById('search').value.toLowerCase();
            li.innerHTML = '';
            db.filter(p => p.n.toLowerCase().includes(q)).forEach(p => {
                li.innerHTML += `<div class="item-row">
                    <div><b>${p.n}</b><br><span class="badge-stock" style="background:${p.s<5? 'rgba(244,63,94,0.1)' : 'rgba(16,185,129,0.1)'}; color:${p.s<5? 'var(--danger)' : 'var(--success)'}">${p.s} in stock</span></div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <b style="font-size:18px;">$${p.v}</b>
                        <button onclick="vender(${p.id})" style="background:var(--accent); border:none; width:40px; height:40px; border-radius:12px; font-weight:800;">+</button>
                    </div>
                </div>`;
            });
        }

        const lf = document.getElementById('list-fiados');
        if(lf) {
            let tf = 0; lf.innerHTML = '';
            fiados.forEach(f => {
                tf += f.a;
                lf.innerHTML += `<div class="item-row"><div><b>${f.n}</b><br><small>${f.fecha}</small></div><div style="color:var(--danger); font-weight:800;">$${f.a}</div></div>`;
            });
            document.getElementById('total-fiado').innerText = "$" + tf.toFixed(2);
        }
        lucide.createIcons();
    }

    function compartirCatalogo() {
        let t = "💎 *PRESTIGE CATALOG* 💎\n\n";
        db.forEach(p => t += `⚜️ ${p.n.toUpperCase()} - *$${p.v}*\n`);
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }

    window.onload = () => {
        const frases = ["Focus on the vision.", "Capitalize on every moment.", "Master the inventory.", "Excellence is a habit.", "The clean shop sells more."];
        document.getElementById('quote').innerText = frases[Math.floor(Math.random()*frases.length)];
        render();
    };
</script>
</body>
</html>
