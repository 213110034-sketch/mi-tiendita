<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi tiendita</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"San Francisco",sans-serif;
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
color:white;
}
header{
position:fixed;
top:0;
width:100%;
padding:15px;
text-align:center;
font-weight:bold;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.08);
}
.page{display:none;padding:80px 15px;}
.active{display:block}
.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:20px;
margin:10px 0;
}
button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:15px;
font-weight:bold;
background:#0072ff;
color:white;
}
.btn-danger{background:#ff4b2b;}
input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:15px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}
.watermark{
position:fixed;
bottom:10px;
left:10px;
opacity:.25;
}
</style>
</head>

<body>

<header>🏪 Mi tiendita</header>

<div id="home" class="page active">
<div class="card">
<h2 id="total">$0</h2>
<p id="profit"></p>
<p id="forecast"></p>
<p id="frase"></p>
</div>

<button onclick="show('pos')">🛒 Vender</button>
<button onclick="show('inventory')">📦 Inventario</button>
<button onclick="show('stats')">📊 Inteligencia</button>
</div>

<div id="inventory" class="page">
<button onclick="show('home')">⬅️</button>

<input id="name" placeholder="Producto">
<input id="cost" placeholder="Costo">
<input id="price" placeholder="Precio">
<input id="qty" placeholder="Cantidad">
<button onclick="addProduct()">Agregar</button>

<div id="inv"></div>
</div>

<div id="pos" class="page">
<button onclick="show('home')">⬅️</button>

<div id="products"></div>

<div class="card">
<h3>🧾 Ticket</h3>
<div id="cart"></div>
<h2 id="cartTotal">$0</h2>
<button onclick="sell()">Cobrar</button>
</div>
</div>

<div id="stats" class="page">
<button onclick="show('home')">⬅️</button>
<canvas id="chart1"></canvas>
<div id="top"></div>
<div id="suggest"></div>
</div>

<div class="watermark">cruzzz</div>

<script>

let db=JSON.parse(localStorage.getItem('db'))||{products:[],sales:[]};
let carrito=[];

function show(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');
if(p==='inventory')renderInv();
if(p==='pos')renderPOS();
if(p==='stats')intelligence();
}

function save(){
localStorage.setItem('db',JSON.stringify(db));
update();
}

/* 🔥 PRODUCTOS */
function addProduct(){

if(!name.value.trim()){
alert("Ponle nombre al producto bro 😅");
return;
}

if(!price.value || !qty.value){
alert("Completa los datos");
return;
}

db.products.push({
id:Date.now(),
name:name.value.trim(),
cost:+cost.value||0,
price:+price.value,
stock:+qty.value
});

name.value=cost.value=price.value=qty.value="";
save();
renderInv();
}

function deleteProduct(id){
db.products=db.products.filter(p=>p.id!==id);
save();
renderInv();
}

function renderInv(){
inv.innerHTML="";
db.products.forEach(p=>{
inv.innerHTML+=`
<div class="card">
${p.name} $${p.price} Stock:${p.stock}
<button class="btn-danger" onclick="deleteProduct(${p.id})">Eliminar</button>
</div>`;
});
}

/* 🔥 POS */
function renderPOS(){
products.innerHTML="";
db.products.forEach(p=>{
products.innerHTML+=`
<div class="card">
${p.name || "Producto sin nombre"} $${p.price}

<button onclick="addCart(${p.id})">➕</button>
<button class="btn-danger" onclick="deleteFromPOS(${p.id})">❌</button>

</div>`;
});
renderCart();
}

function deleteFromPOS(id){
if(!confirm("¿Eliminar producto?"))return;
db.products=db.products.filter(p=>p.id!==id);
save();
renderPOS();
}

function addCart(id){
let p=db.products.find(x=>x.id===id);
if(p.stock<=0)return alert("Sin stock");
carrito.push(p);
renderCart();
}

function removeCart(i){
carrito.splice(i,1);
renderCart();
}

function renderCart(){
cart.innerHTML="";
let t=0;
carrito.forEach((i,index)=>{
t+=i.price;
cart.innerHTML+=`
<div>
${i.name}
<button onclick="removeCart(${index})">❌</button>
</div>`;
});
cartTotal.innerText="$"+t;
}

function sell(){
let total=0,cost=0;
carrito.forEach(i=>{
total+=i.price;
cost+=i.cost;
db.products.find(p=>p.id===i.id).stock--;
});
db.sales.push({items:carrito,total,profit:total-cost});
carrito=[];
save();
renderPOS();
}

/* DASH */
function update(){
let t=db.sales.reduce((a,b)=>a+b.total,0);
total.innerText="$"+t;
}

/* INTELIGENCIA */
function intelligence(){
let v=db.sales.map(s=>s.total);
new Chart(chart1,{type:'line',data:{labels:v.map((_,i)=>i),datasets:[{data:v}]}});

let count={};
db.sales.forEach(s=>{
s.items.forEach(i=>{
count[i.name]=(count[i.name]||0)+1;
});
});

top.innerHTML="";
Object.entries(count).forEach(p=>{
top.innerHTML+=`<div>${p[0]} ${p[1]}</div>`;
});
}

/* FRASES */
let frases=["💸 Sigue vendiendo","🔥 Vas bien","📈 Creciendo"];
setInterval(()=>{
frase.innerText=frases[Math.floor(Math.random()*frases.length)];
},4000);

update();

</script>

</body>
</html>
