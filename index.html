<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cruzz Business PRO FINAL</title>

<style>
body{font-family:Arial;background:#0a1f44;color:white;text-align:center}
.page{display:none;padding:20px}
.active{display:block}
input,button,select{padding:10px;margin:5px}
.card{background:rgba(255,255,255,0.1);padding:10px;margin:5px;border-radius:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>🔐 Login</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- HOME -->
<div id="home" class="page">
<h2 id="total"></h2>
<h3 id="profit"></h3>

<button onclick="showPage('pos')">🛒 Vender</button>
<button onclick="showPage('inventory')">📦 Inventario</button>

<div id="adminPanel" style="display:none">
<button onclick="showPage('owner')">👑 Panel Dueño</button>
<button onclick="showPage('logs')">📜 Movimientos</button>
</div>
</div>

<!-- POS -->
<div id="pos" class="page">
<button onclick="showPage('home')">⬅️</button>

<select id="store">
<option>Tienda 1</option>
<option>Tienda 2</option>
</select>

<div id="products"></div>

<h3>Carrito</h3>
<div id="cart"></div>

<h2 id="cartTotal"></h2>

<button onclick="sell()">💰 Vender</button>
</div>

<!-- INVENTARIO -->
<div id="inventory" class="page">
<button onclick="showPage('home')">⬅️</button>

<div id="adminOnly">
<input id="name" placeholder="Producto">
<input id="cost" placeholder="Costo">
<input id="price" placeholder="Precio">
<input id="qty" placeholder="Cantidad">
<button onclick="addProduct()">Agregar</button>
</div>

<div id="inv"></div>
</div>

<!-- PANEL DUEÑO -->
<div id="owner" class="page">
<button onclick="showPage('home')">⬅️</button>
<h2>👑 Panel Dueño</h2>
<div id="ownerStats"></div>
</div>

<!-- LOGS -->
<div id="logs" class="page">
<button onclick="showPage('home')">⬅️</button>
<h2>📜 Movimientos</h2>
<div id="logList"></div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('db')) || {
products:[], sales:[], logs:[]
};

let currentUser=null;
let cart=[];

// LOGIN
function login(){
let u=user.value;
let p=pass.value;

if(u==="admin" && p==="1234"){
currentUser="admin";
adminPanel.style.display="block";
adminOnly.style.display="block";
}
else if(u==="empleado" && p==="1234"){
currentUser="emp";
adminOnly.style.display="none";
}
else{
return alert("Datos incorrectos");
}

showPage('home');
}

// NAV
function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');

if(p==='inventory') renderInv();
if(p==='pos') renderPOS();
if(p==='owner') renderOwner();
if(p==='logs') renderLogs();
}

// SAVE
function save(){
localStorage.setItem('db',JSON.stringify(db));
update();
}

// LOG
function log(action){
db.logs.push({
action,
user:currentUser,
date:new Date().toLocaleString()
});
}

// INVENTARIO
function addProduct(){
if(currentUser!=="admin") return alert("No autorizado");

let p={
id:Date.now(),
name:name.value,
cost:+cost.value,
price:+price.value,
stock:+qty.value
};

db.products.push(p);
log("Agregó producto: "+p.name);
save();
renderInv();
}

function renderInv(){
inv.innerHTML="";
db.products.forEach(p=>{
inv.innerHTML+=`<div class="card">
${p.name} - $${p.price} | Stock:${p.stock}
${currentUser==="admin" ? `<button onclick="del(${p.id})">❌</button>` : ""}
</div>`;
});
}

function del(id){
if(currentUser!=="admin") return;

db.products=db.products.filter(p=>p.id!==id);
log("Eliminó producto");
save();
renderInv();
}

// POS
function renderPOS(){
products.innerHTML="";
db.products.forEach(p=>{
products.innerHTML+=`<div class="card">
${p.name} $${p.price}
<button onclick="addCart(${p.id})">+</button>
</div>`;
});
renderCart();
}

function addCart(id){
let p=db.products.find(x=>x.id===id);
if(p.stock<=0) return alert("Sin stock");
cart.push(p);
renderCart();
}

function renderCart(){
cart.innerHTML="";
let total=0;

cart.forEach(i=>{
total+=i.price;
cart.innerHTML+=`<div>${i.name}</div>`;
});

cartTotal.innerText="Total: $"+total;
}

// VENDER
function sell(){
if(cart.length===0) return;

let total=0,cost=0;

cart.forEach(i=>{
total+=i.price;
cost+=i.cost;

let p=db.products.find(x=>x.id===i.id);
p.stock--;
});

let sale={
total,
profit:total-cost,
store:store.value,
date:new Date().toLocaleString()
};

db.sales.push(sale);
log("Venta $"+sale.total+" en "+sale.store);

alert("Venta realizada 💰");

cart=[];
save();
renderPOS();
}

// OWNER
function renderOwner(){
let total=0, profit=0;

db.sales.forEach(s=>{
total+=s.total;
profit+=s.profit;
});

ownerStats.innerHTML=`
<div class="card">Ventas: $${total}</div>
<div class="card">Ganancia: $${profit}</div>
<div class="card">Ventas totales: ${db.sales.length}</div>
`;
}

// LOGS
function renderLogs(){
logList.innerHTML="";
db.logs.forEach(l=>{
logList.innerHTML+=`<div class="card">
${l.action}<br>
Usuario: ${l.user}<br>
${l.date}
</div>`;
});
}

// DASHBOARD
function update(){
let t=db.sales.reduce((a,b)=>a+b.total,0);
let p=db.sales.reduce((a,b)=>a+b.profit,0);

total.innerText="Ventas: $"+t;
profit.innerText="Ganancia: $"+p;
}

update();
</script>

</body>
</html>
