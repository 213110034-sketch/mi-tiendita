<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi tiendita</title>

<style>
:root{
--primary:#001f3f;
--secondary:#00d4ff;
--accent:#2ecc71;
--danger:#e74c3c;
--glass:rgba(255,255,255,0.1);
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#003366,#001f3f);
color:white;
}

.page{display:none;padding:15px;}
.active{display:block;}

.card{
background:var(--glass);
padding:15px;
border-radius:15px;
margin:10px 0;
backdrop-filter:blur(10px);
}

input,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
font-size:1rem;
}

input{background:white;color:black;}

button{
background:var(--secondary);
color:black;
font-weight:bold;
cursor:pointer;
}

h1,h2{text-align:center;}

.nav button{
margin:5px 0;
}

/* watermark */
.watermark{
position:fixed;
bottom:10px;
left:10px;
font-size:0.8rem;
opacity:0.3;
color:#00d4ff;
letter-spacing:2px;
pointer-events:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<h1>🏪 Mi tiendita</h1>
<h2>🔐 Iniciar sesión</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<!-- HOME -->
<div id="home" class="page">
<h2 id="total">$0</h2>
<h3 id="profit">Ganancia $0</h3>

<div class="nav">
<button onclick="showPage('pos')">🛒 Vender</button>
<button onclick="showPage('inventory')">📦 Inventario</button>
</div>

<div id="adminPanel" style="display:none">
<button onclick="showPage('users')">👥 Usuarios</button>
<button onclick="showPage('owner')">👑 Panel dueño</button>
<button onclick="showPage('logs')">📜 Logs</button>
</div>
</div>

<!-- USUARIOS -->
<div id="users" class="page">
<button onclick="showPage('home')">⬅️ Volver</button>

<h2>👥 Crear empleado</h2>
<input id="newUser" placeholder="Usuario">
<input id="newPass" placeholder="Contraseña">
<button onclick="createUser()">Crear usuario</button>

<div id="userList"></div>
</div>

<!-- INVENTARIO -->
<div id="inventory" class="page">
<button onclick="showPage('home')">⬅️ Volver</button>

<div id="adminOnly">
<input id="name" placeholder="Producto">
<input id="cost" placeholder="Costo">
<input id="price" placeholder="Precio">
<input id="qty" placeholder="Cantidad">
<button onclick="addProduct()">Agregar producto</button>
</div>

<div id="inv"></div>
</div>

<!-- POS -->
<div id="pos" class="page">
<button onclick="showPage('home')">⬅️ Volver</button>

<div id="products"></div>

<h3>🧾 Carrito</h3>
<div id="cart"></div>
<h2 id="cartTotal">$0</h2>

<button onclick="sell()">Finalizar venta</button>
</div>

<!-- OWNER -->
<div id="owner" class="page">
<button onclick="showPage('home')">⬅️ Volver</button>
<h2>👑 Panel del dueño</h2>
<div id="ownerStats"></div>
</div>

<!-- LOGS -->
<div id="logs" class="page">
<button onclick="showPage('home')">⬅️ Volver</button>
<h2>📜 Movimientos</h2>
<div id="logList"></div>
</div>

<!-- WATERMARK -->
<div class="watermark">cruzzz</div>

<script>
let db = JSON.parse(localStorage.getItem('db')) || {
products:[],
sales:[],
logs:[],
users:[{user:"admin",pass:"admin123",role:"admin"}]
};

let currentUser=null;
let cart=[];

// LOGIN
function login(){
let u=user.value;
let p=pass.value;

let found=db.users.find(x=>x.user===u && x.pass===p);

if(!found) return alert("Datos incorrectos");

currentUser=found;

if(found.role==="admin"){
adminPanel.style.display="block";
adminOnly.style.display="block";
}else{
adminOnly.style.display="none";
}

showPage('home');
}

// CREAR USUARIO
function createUser(){
if(currentUser.role!=="admin") return;

db.users.push({
user:newUser.value,
pass:newPass.value,
role:"emp"
});

save();
renderUsers();
}

// RENDER USERS
function renderUsers(){
userList.innerHTML="";
db.users.forEach(u=>{
userList.innerHTML+=`<div class="card">${u.user} (${u.role})</div>`;
});
}

// NAV
function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');

if(p==='inventory') renderInv();
if(p==='pos') renderPOS();
if(p==='owner') renderOwner();
if(p==='logs') renderLogs();
if(p==='users') renderUsers();
}

// SAVE
function save(){
localStorage.setItem('db',JSON.stringify(db));
update();
}

// LOG
function log(a){
db.logs.push({
action:a,
user:currentUser.user,
date:new Date().toLocaleString()
});
}

// INVENTARIO
function addProduct(){
if(currentUser.role!=="admin") return;

let p={
id:Date.now(),
name:name.value,
cost:+cost.value,
price:+price.value,
stock:+qty.value
};

db.products.push(p);
log("Agregó "+p.name);
save();
renderInv();
}

function renderInv(){
inv.innerHTML="";
db.products.forEach(p=>{
inv.innerHTML+=`
<div class="card">
${p.name} - $${p.price} | Stock: ${p.stock}
${currentUser.role==="admin" ? `<button onclick="del(${p.id})">Eliminar</button>` : ""}
</div>`;
});
}

function del(id){
db.products=db.products.filter(p=>p.id!==id);
log("Eliminó producto");
save();
renderInv();
}

// POS
function renderPOS(){
products.innerHTML="";
db.products.forEach(p=>{
products.innerHTML+=`
<div class="card">
${p.name} $${p.price}
<button onclick="addCart(${p.id})">Agregar</button>
</div>`;
});
renderCart();
}

function addCart(id){
let p=db.products.find(x=>x.id===id);
if(p.stock<=0) return alert("Sin stock");

cart.push(p);
renderCart();
}

function renderCart(){
cart.innerHTML="";
let t=0;

cart.forEach(i=>{
t+=i.price;
cart.innerHTML+=`<div>${i.name}</div>`;
});

cartTotal.innerText="$"+t;
}

// VENDER
function sell(){
let total=0,cost=0;

cart.forEach(i=>{
total+=i.price;
cost+=i.cost;
db.products.find(p=>p.id===i.id).stock--;
});

db.sales.push({
total,
profit:total-cost,
user:currentUser.user,
date:new Date()
});

log("Venta de $"+total);

cart=[];
save();
renderPOS();
}

// OWNER
function renderOwner(){
let t=0,p=0;

db.sales.forEach(s=>{
t+=s.total;
p+=s.profit;
});

ownerStats.innerHTML=`
<div class="card">
<h2>Ventas: $${t}</h2>
<h3>Ganancia real: $${p}</h3>
</div>`;
}

// LOGS
function renderLogs(){
logList.innerHTML="";
db.logs.forEach(l=>{
logList.innerHTML+=`
<div class="card">
${l.action}<br>
👤 ${l.user}<br>
📅 ${l.date}
</div>`;
});
}

// DASHBOARD
function update(){
let t=db.sales.reduce((a,b)=>a+b.total,0);
let p=db.sales.reduce((a,b)=>a+b.profit,0);

total.innerText="$"+t;
profit.innerText="Ganancia $"+p;
}

update();
</script>

</body>
</html>
