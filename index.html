<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cruzz Business PRO UI</title>

<style>
:root{
--primary:#001f3f;
--secondary:#00d4ff;
--accent:#2ecc71;
--danger:#e74c3c;
--glass:rgba(255,255,255,0.1);
--border:rgba(255,255,255,0.2);
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#003366,#001f3f);
color:white;
}

/* PÁGINAS */
.page{display:none;padding:15px;animation:fade .3s}
.active{display:block}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

/* TARJETAS */
.card{
background:var(--glass);
backdrop-filter:blur(10px);
border:1px solid var(--border);
border-radius:20px;
padding:15px;
margin:10px 0;
}

/* INPUTS */
input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
}

/* BOTONES */
button{
background:var(--secondary);
color:black;
padding:12px;
border:none;
border-radius:12px;
margin:5px 0;
font-weight:bold;
width:100%;
}

button:active{transform:scale(.97)}

/* HEADER */
.header{
text-align:center;
padding:15px;
}

.title{
font-size:2rem;
color:var(--secondary);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.nav-btn{
padding:20px;
text-align:center;
border-radius:15px;
background:var(--glass);
border:1px solid var(--border);
}

.nav-btn:hover{
background:var(--secondary);
color:black;
}

.small-btn{
width:auto;
padding:6px 12px;
background:var(--danger);
color:white;
}

/* STATUS */
.total{
font-size:2rem;
color:var(--accent);
text-align:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="header">
<h1 class="title">Cruzz App 🔐</h1>
</div>

<div class="card">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="header">
<h2>Dashboard</h2>
<div class="total" id="total"></div>
<p id="profit"></p>
</div>

<div class="grid">
<div class="nav-btn" onclick="showPage('pos')">🛒 Vender</div>
<div class="nav-btn" onclick="showPage('inventory')">📦 Stock</div>
</div>

<div id="adminPanel" class="grid" style="display:none">
<div class="nav-btn" onclick="showPage('owner')">👑 Dueño</div>
<div class="nav-btn" onclick="showPage('logs')">📜 Logs</div>
</div>
</div>

<!-- POS -->
<div id="pos" class="page">
<button onclick="showPage('home')">⬅️</button>

<div class="card">
<select id="store">
<option>Tienda 1</option>
<option>Tienda 2</option>
</select>
</div>

<div id="products"></div>

<div class="card">
<h3>Carrito</h3>
<div id="cart"></div>
<h2 id="cartTotal"></h2>
<button onclick="sell()">💰 Vender</button>
</div>
</div>

<!-- INVENTARIO -->
<div id="inventory" class="page">
<button onclick="showPage('home')">⬅️</button>

<div id="adminOnly" class="card">
<input id="name" placeholder="Producto">
<input id="cost" placeholder="Costo">
<input id="price" placeholder="Precio">
<input id="qty" placeholder="Cantidad">
<button onclick="addProduct()">Agregar</button>
</div>

<div id="inv"></div>
</div>

<!-- OWNER -->
<div id="owner" class="page">
<button onclick="showPage('home')">⬅️</button>
<div class="card" id="ownerStats"></div>
</div>

<!-- LOGS -->
<div id="logs" class="page">
<button onclick="showPage('home')">⬅️</button>
<div id="logList"></div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('db')) || {products:[],sales:[],logs:[]};
let currentUser=null;
let cart=[];

function login(){
if(user.value==="admin" && pass.value==="1234"){
currentUser="admin";
adminPanel.style.display="grid";
adminOnly.style.display="block";
}
else if(user.value==="empleado" && pass.value==="1234"){
currentUser="emp";
adminOnly.style.display="none";
}
else return alert("Error");

showPage('home');
}

function showPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');

if(p==='inventory') renderInv();
if(p==='pos') renderPOS();
if(p==='owner') renderOwner();
if(p==='logs') renderLogs();
}

function save(){
localStorage.setItem('db',JSON.stringify(db));
update();
}

function log(a){
db.logs.push({action:a,user:currentUser,date:new Date().toLocaleString()});
}

// INVENTARIO
function addProduct(){
if(currentUser!=="admin") return alert("No autorizado");

let p={id:Date.now(),name:name.value,cost:+cost.value,price:+price.value,stock:+qty.value};
db.products.push(p);
log("Agregó "+p.name);
save(); renderInv();
}

function renderInv(){
inv.innerHTML="";
db.products.forEach(p=>{
inv.innerHTML+=`<div class="card">
${p.name} - $${p.price} | ${p.stock}
${currentUser==="admin"?`<button class="small-btn" onclick="del(${p.id})">X</button>`:""}
</div>`;
});
}

function del(id){
db.products=db.products.filter(p=>p.id!==id);
log("Eliminó producto");
save(); renderInv();
}

// POS
function renderPOS(){
products.innerHTML="";
db.products.forEach(p=>{
products.innerHTML+=`<div class="card">
${p.name} $${p.price}
<button onclick="addCart(${p.id})">+</button>
</div>`;
});
renderCart();
}

function addCart(id){
let p=db.products.find(x=>x.id===id);
if(p.stock<=0) return alert("Sin stock");
cart.push(p);
renderCart();
}

function renderCart(){
cart.innerHTML="";
let total=0;
cart.forEach(i=>{
total+=i.price;
cart.innerHTML+=`<div>${i.name}</div>`;
});
cartTotal.innerText="Total: $"+total;
}

// VENDER
function sell(){
if(cart.length===0) return;

let total=0,cost=0;
cart.forEach(i=>{
total+=i.price;
cost+=i.cost;
db.products.find(p=>p.id===i.id).stock--;
});

let sale={total,profit:total-cost,store:store.value,date:new Date()};
db.sales.push(sale);
log("Venta $"+total);

cart=[];
save();
renderPOS();
}

// OWNER
function renderOwner(){
let t=0,p=0;
db.sales.forEach(s=>{t+=s.total;p+=s.profit});
ownerStats.innerHTML=`<h2>Ventas: $${t}</h2><h3>Ganancia: $${p}</h3>`;
}

// LOGS
function renderLogs(){
logList.innerHTML="";
db.logs.forEach(l=>{
logList.innerHTML+=`<div class="card">${l.action}<br>${l.user}<br>${l.date}</div>`;
});
}

// DASHBOARD
function update(){
let t=db.sales.reduce((a,b)=>a+b.total,0);
let p=db.sales.reduce((a,b)=>a+b.profit,0);
total.innerText="$"+t;
profit.innerText="Ganancia: $"+p;
}

update();
</script>

</body>
</html>
