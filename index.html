<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi tiendita V3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(#001f3f,#000);color:white}
header{position:fixed;top:0;width:100%;padding:15px;background:#001f3f;text-align:center}
.page{display:none;padding:80px 15px}
.active{display:block}
.card{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px;margin:10px 0}
button,input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none}
button{background:#00d4ff;color:black;font-weight:bold}
.low{color:red}
.warn{color:orange}
.watermark{position:fixed;bottom:10px;left:10px;opacity:.3;color:#00d4ff}
</style>
</head>

<body>

<header>🏪 Mi tiendita V3 🧠</header>

<div id="home" class="page active">
<div class="card">
<h2 id="total">$0</h2>
<p id="profit"></p>
<p id="forecast"></p>
</div>

<button onclick="show('pos')">🛒 Vender</button>
<button onclick="show('inventory')">📦 Inventario</button>
<button onclick="show('stats')">📊 Inteligencia</button>
<button onclick="show('debts')">💳 Fiado</button>
<button onclick="show('expenses')">💰 Gastos</button>
<button onclick="corte()">💸 Corte</button>

<button onclick="exportData()">📤 Respaldar</button>
<input type="file" onchange="importData(event)">
</div>

<!-- INVENTARIO -->
<div id="inventory" class="page">
<button onclick="show('home')">⬅️</button>
<input id="search" placeholder="🔎 Buscar..." onkeyup="renderInv()">

<input id="name" placeholder="Producto">
<input id="cost" placeholder="Costo">
<input id="price" placeholder="Precio">
<input id="qty" placeholder="Cantidad">
<button onclick="addProduct()">Agregar</button>

<div id="inv"></div>
</div>

<!-- POS -->
<div id="pos" class="page">
<button onclick="show('home')">⬅️</button>
<div id="products"></div>

<div class="card">
<h3>🧾 Ticket</h3>
<div id="cart"></div>
<h2 id="cartTotal">$0</h2>
<button onclick="sell()">Cobrar</button>
</div>
</div>

<!-- FIADO -->
<div id="debts" class="page">
<button onclick="show('home')">⬅️</button>
<input id="dname" placeholder="Cliente">
<input id="damount" placeholder="Monto">
<button onclick="addDebt()">Agregar</button>
<div id="debtList"></div>
</div>

<!-- GASTOS -->
<div id="expenses" class="page">
<button onclick="show('home')">⬅️</button>
<input id="ename" placeholder="Gasto">
<input id="eamount" placeholder="Monto">
<button onclick="addExpense()">Agregar</button>
<div id="expenseList"></div>
</div>

<!-- INTELIGENCIA -->
<div id="stats" class="page">
<button onclick="show('home')">⬅️</button>

<canvas id="chart1"></canvas>

<div class="card">
<h3>🔥 Top productos</h3>
<div id="top"></div>
</div>

<div class="card">
<h3>💸 Sugerencias de precios</h3>
<div id="suggest"></div>
</div>

</div>

<div class="watermark">cruzzz</div>

<script>
let db=JSON.parse(localStorage.getItem('db'))||{
products:[],sales:[],debts:[],expenses:[]
};

let cart=[];

function save(){localStorage.setItem('db',JSON.stringify(db));update();}

function show(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');

if(p==='inventory')renderInv();
if(p==='pos')renderPOS();
if(p==='debts')renderDebts();
if(p==='expenses')renderExpenses();
if(p==='stats')intelligence();
}

function addProduct(){
db.products.push({id:Date.now(),name:name.value,cost:+cost.value,price:+price.value,stock:+qty.value});
save();
}

function renderInv(){
inv.innerHTML="";
db.products.filter(p=>p.name.toLowerCase().includes(search.value.toLowerCase()))
.forEach(p=>{
let warn=(p.price-p.cost)<p.cost*0.3?"warn":"";
inv.innerHTML+=`<div class="card ${p.stock<5?'low':''}">
${p.name} $${p.price} Stock:${p.stock}
<span class="${warn}">${warn?'⚠️ Baja ganancia':''}</span>
</div>`;
});
}

function renderPOS(){
products.innerHTML="";
db.products.forEach(p=>{
products.innerHTML+=`<div class="card">
${p.name} $${p.price}
<button onclick="addCart(${p.id})">+</button>
</div>`;
});
renderCart();
}

function addCart(id){
let p=db.products.find(x=>x.id===id);
if(p.stock<=0)return alert("Sin stock");
cart.push(p);
renderCart();
}

function renderCart(){
cart.innerHTML="";
let t=0;
cart.forEach(i=>{t+=i.price;cart.innerHTML+=`<div>${i.name}</div>`});
cartTotal.innerText="$"+t;
}

function sell(){
let total=0,cost=0;
cart.forEach(i=>{
total+=i.price;
cost+=i.cost;
db.products.find(p=>p.id===i.id).stock--;
});
db.sales.push({items:cart,total,profit:total-cost,date:new Date()});
cart=[];
save();
renderPOS();
}

function addDebt(){db.debts.push({name:dname.value,amount:+damount.value});save();}
function renderDebts(){
debtList.innerHTML="";
db.debts.forEach((d,i)=>{
debtList.innerHTML+=`<div class="card">${d.name} debe $${d.amount}
<button onclick="payDebt(${i})">Pagar</button></div>`;
});
}
function payDebt(i){db.debts.splice(i,1);save();renderDebts();}

function addExpense(){db.expenses.push({name:ename.value,amount:+eamount.value});save();}
function renderExpenses(){
expenseList.innerHTML="";
db.expenses.forEach(e=>expenseList.innerHTML+=`<div class="card">${e.name} $${e.amount}</div>`);
}

function corte(){
let hoy=new Date().toLocaleDateString();
let ventas=db.sales.filter(s=>new Date(s.date).toLocaleDateString()===hoy);
let total=ventas.reduce((a,b)=>a+b.total,0);
let profit=ventas.reduce((a,b)=>a+b.profit,0);
alert(`💸 Corte\nVentas:$${total}\nGanancia:$${profit}`);
}

function update(){
let t=db.sales.reduce((a,b)=>a+b.total,0);
let p=db.sales.reduce((a,b)=>a+b.profit,0);
let gastos=db.expenses.reduce((a,b)=>a+b.amount,0);

total.innerText="$"+t;
profit.innerText="Ganancia real $"+(p-gastos);

forecast.innerText="📈 Pronóstico mensual: $"+forecastCalc();
}

function forecastCalc(){
if(db.sales.length<2)return 0;
let dias=[...new Set(db.sales.map(s=>new Date(s.date).toLocaleDateString()))].length;
let total=db.sales.reduce((a,b)=>a+b.total,0);
let promedio=total/dias;
return (promedio*30).toFixed(2);
}

function intelligence(){
charts();
topProducts();
priceSuggest();
}

function charts(){
let v=db.sales.map(s=>s.total);
new Chart(chart1,{type:'line',data:{labels:v.map((_,i)=>i),datasets:[{data:v}]}});}

function topProducts(){
let count={};
db.sales.forEach(s=>{
s.items.forEach(i=>{
count[i.name]=(count[i.name]||0)+1;
});
});

let sorted=Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,5);

top.innerHTML="";
sorted.forEach(p=>{
top.innerHTML+=`<div>${p[0]} (${p[1]} ventas)</div>`;
});
}

function priceSuggest(){
suggest.innerHTML="";
db.products.forEach(p=>{
let profit=p.price-p.cost;
if(profit<p.cost*0.3){
let rec=(p.cost*1.3).toFixed(2);
suggest.innerHTML+=`<div class="warn">${p.name} sube a $${rec}</div>`;
}
});
}

function exportData(){
let blob=new Blob([JSON.stringify(db)],{type:"application/json"});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

function importData(e){
let reader=new FileReader();
reader.onload=()=>{db=JSON.parse(reader.result);save();};
reader.readAsText(e.target.files[0]);
}

update();
</script>

</body>
</html>
