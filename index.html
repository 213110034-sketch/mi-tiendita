<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Tienda Inteligente Pro 💎</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0F172A; --glass: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3B82F6; --accent: #8B5CF6; --success: #10B981; --danger: #EF4444;
            --warning: #F59E0B; --text-main: #F1F5F9; --text-dim: #94A3B8;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 40px; }
        .screen { display: none; padding: 25px 20px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        .hero-card { background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%); border-radius: 30px; padding: 25px; border: 1px solid var(--glass-border); margin-bottom: 25px; }
        .balance { font-size: 38px; font-weight: 800; margin: 8px 0; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .menu-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; text-align: center; cursor: pointer; }
        .menu-item i { color: var(--primary); margin-bottom: 12px; display: inline-block; }

        .data-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 18px; border-radius: 22px; margin-bottom: 12px; }
        .ai-box { background: rgba(59, 130, 246, 0.1); border-radius: 15px; padding: 15px; margin: 10px 0; border: 1px dashed var(--primary); }
        
        .badge { padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; display: inline-block; margin-top: 5px;}
        .bg-red { background: rgba(239, 68, 68, 0.2); color: #FFAAAA; border: 1px solid var(--danger); }
        .bg-orange { background: rgba(245, 158, 11, 0.2); color: #FFDDAA; border: 1px solid var(--warning); }
        .bg-green { background: rgba(16, 185, 129, 0.2); color: #AAFFDD; border: 1px solid var(--success); }
        
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        
        input, select, textarea { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; margin: 8px 0; box-sizing: border-box; }
        .back-btn { width: 45px; height: 45px; border-radius: 15px; background: var(--glass); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; color: white; }
        
        /* NUEVA FIRMA INFERIOR IZQUIERDA */
        .gothic-signature {
            position: fixed;
            bottom: 15px;
            left: 20px;
            font-family: 'UnifrakturMaguntia', serif;
            font-size: 22px;
            color: rgba(203, 213, 225, 0.4);
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="scr-home" class="screen active">
    <div style="margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center;">
        <div><h2 id="txt-saludo" style="margin:0; font-weight: 800; color: #fff;">¡Hola, Jefe!</h2><p id="quote" style="color: var(--text-dim); font-size: 12px; margin:0;"></p></div>
        <div style="background: var(--primary); padding: 8px; border-radius: 12px;"><i data-lucide="zap" style="width:24px; height:24px; color:#fff"></i></div>
    </div>
    <div class="hero-card">
        <div style="display:flex; justify-content:space-between; align-items:start;">
            <div><small id="l-caja" class="stat-label" style="color:var(--text-dim)">VENDIDO HOY 💰</small><div class="balance" id="h-caja">$0.00</div></div>
            <div style="text-align:right"><small class="stat-label" style="color:var(--text-dim)">PRECISIÓN 🎯</small><div id="h-mape" style="font-weight:800; font-size:20px; color: var(--success);">100%</div></div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <div><small id="l-costo" class="stat-label" style="opacity:0.6">COSTO 📦</small><div id="h-costos-v" style="color: #F87171; font-weight: 800;">$0</div></div>
            <div style="text-align: right;"><small id="l-util" class="stat-label" style="opacity:0.6">NETO 💎</small><div id="h-util" style="color: var(--success); font-weight: 800;">$0</div></div>
        </div>
    </div>
    <div class="menu-grid">
        <div class="menu-item" onclick="goTo('scr-inv')"><i data-lucide="package"></i><span id="m-inv">Inventario</span></div>
        <div class="menu-item" onclick="goTo('scr-sucursales')"><i data-lucide="map-pin"></i><span id="m-suc">Tiendas</span></div>
        <div class="menu-item" onclick="goTo('scr-reports')"><i data-lucide="bar-chart-2"></i><span id="m-rep">Mis Logros</span></div>
        <div class="menu-item" onclick="goTo('scr-ai')"><i data-lucide="brain-circuit"></i><span id="m-ai">Asesor AI</span></div>
        <div class="menu-item" onclick="goTo('scr-config')"><i data-lucide="sliders"></i><span id="m-cfg">Ajustes</span></div>
        <div class="menu-item" onclick="finalizarDia()" style="background: var(--success);"><i data-lucide="check-circle" style="color:white"></i><span style="color:white">Cerrar Día</span></div>
    </div>
</div>

<div id="scr-inv" class="screen">
    <button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="chevron-left"></i></button>
    <h2>📦 Inventario</h2>
    <div class="data-card">
        <input type="text" id="n" placeholder="Nombre...">
        <div style="display:flex; gap:10px;"><input type="number" id="costo" placeholder="Costo $" oninput="calcAI()"><input type="number" id="v" placeholder="Venta $"></div>
        <input type="number" id="s" placeholder="Cantidad">
        <small style="font-size:10px; color:var(--text-dim)">Fecha de Caducidad (Opcional):</small>
        <input type="date" id="caducidad">
        <button onclick="add()" class="btn btn-primary">Guardar Producto</button>
    </div>
    <div id="list-inv"></div>
</div>

<div id="scr-ai" class="screen">
    <button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="chevron-left"></i></button>
    <h2>🧠 Predicción AI</h2>
    <div id="ai-prediction" class="hero-card" style="background: var(--accent); margin-bottom:15px;">
        <small class="stat-label" style="color:white; opacity:0.8">PROYECCIÓN SEMANAL 🚀</small>
        <div id="pred-ventas" class="balance" style="font-size:28px;">$0.00</div>
        <small style="color:white">Ganancia estimada: <span id="pred-util">$0.00</span></small>
    </div>
    <div id="ai-content"></div>
</div>

<div id="scr-config" class="screen">
    <button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="chevron-left"></i></button>
    <h2>⚙️ Ajustes</h2>
    <button onclick="copiarCloud()" class="btn btn-primary">Respaldar Datos 🔑</button>
</div>

<div id="scr-reports" class="screen"><button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="chevron-left"></i></button><h2>📊 Logros</h2><div class="data-card"><canvas id="mainChart"></canvas></div><div id="history-list"></div></div>
<div id="scr-sucursales" class="screen"><button class="back-btn" onclick="goTo('scr-home')"><i data-lucide="chevron-left"></i></button><h2>📍 Tiendas</h2><div id="list-sucursales"></div></div>

<div class="gothic-signature">Cruzz</div>

<script>
    let db = JSON.parse(localStorage.getItem('the_db')) || [];
    let historial = JSON.parse(localStorage.getItem('the_hi')) || [];
    let caja = parseFloat(localStorage.getItem('the_ca')) || 0;
    let costoVendido = parseFloat(localStorage.getItem('the_cv')) || 0;
    let metaVenta = 1000;

    function goTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'scr-ai') generarAI();
        if(id === 'scr-reports') renderChart();
        render();
    }

    function add() {
        const n = document.getElementById('n').value, v = parseFloat(document.getElementById('v').value), 
              s = parseInt(document.getElementById('s').value), c = parseFloat(document.getElementById('costo').value),
              cad = document.getElementById('caducidad').value;
        if(n && v) { db.push({id: Date.now(), n, c: c||0, v, s: s||0, vtas: 0, cad}); save(); }
    }

    function vender(id) {
        let p = db.find(x => x.id === id);
        if(p && p.s > 0) { p.s--; p.vtas++; caja += p.v; costoVendido += p.c; save(); }
    }

    function save() {
        localStorage.setItem('the_db', JSON.stringify(db)); localStorage.setItem('the_hi', JSON.stringify(historial));
        localStorage.setItem('the_ca', caja); localStorage.setItem('the_cv', costoVendido); render();
    }

    function generarAI() {
        const c = document.getElementById('ai-content'); c.innerHTML = '';
        // IA DE PREDICCIÓN
        const dias = historial.length || 1;
        const promedioVenta = historial.reduce((a,b)=>a+b.vta,0) / dias;
        const promedioUtil = historial.reduce((a,b)=>a+b.neto,0) / dias;
        
        document.getElementById('pred-ventas').innerText = "$" + (promedioVenta * 7).toFixed(2);
        document.getElementById('pred-util').innerText = "$" + (promedioUtil * 7).toFixed(2);

        db.forEach(p => {
            let avisoCad = "";
            if(p.cad) {
                const diff = (new Date(p.cad) - new Date()) / (1000*60*60*24);
                if(diff < 7) avisoCad = `<p style="color:var(--danger); font-size:11px;">⚠️ Caduca en ${Math.ceil(diff)} días.</p>`;
            }
            c.innerHTML += `<div class="data-card"><b>${p.n}</b>${avisoCad}<p style="font-size:12px; color:var(--primary);">IA: Se estima vender ${Math.ceil(p.vtas/dias * 7)} unidades esta semana.</p></div>`;
        });
    }

    function render() {
        document.getElementById('h-caja').innerText = "$" + caja.toFixed(2);
        document.getElementById('h-costos-v').innerText = "$" + costoVendido.toFixed(2);
        document.getElementById('h-util').innerText = "$" + (caja - costoVendido).toFixed(2);
        const li = document.getElementById('list-inv');
        if(li) {
            li.innerHTML = '';
            db.forEach(p => {
                let color = p.s <= 3 ? 'bg-red' : 'bg-green';
                let cadTag = p.cad ? `<small style="display:block; font-size:10px; color:var(--text-dim)">Exp: ${p.cad}</small>` : "";
                li.innerHTML += `<div class="data-card"><b>${p.n}</b>${cadTag}<div style="margin-top:5px;"><span class="badge ${color}">Stock: ${p.s}</span></div><button onclick="vender(${p.id})" class="btn-primary" style="margin-top:10px; width:100%;">VENTA +</button></div>`;
            });
        }
        lucide.createIcons();
    }

    function finalizarDia() {
        historial.push({ fecha: new Date().toLocaleDateString(), neto: caja - costoVendido, vta: caja });
        caja = 0; costoVendido = 0; save(); alert("Cierre exitoso.");
    }

    window.onload = () => { render(); lucide.createIcons(); };
</script>
</body>
</html>
